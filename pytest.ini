[pytest]
# 异步测试支持
asyncio_mode = auto

# 测试发现路径
pythonpath = . src

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认命令行参数
addopts = -v --tb=short

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
