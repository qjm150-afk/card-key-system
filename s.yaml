edition: 1.0.0
name: card-key-system
access: default

vars:
  region: cn-hangzhou

services:
  card-key-api:
    component: fc
    props:
      region: ${vars.region}
      service:
        name: card-key-service
        description: 卡密验证系统
        internetAccess: true
        logConfig: auto
      function:
        name: api
        description: FastAPI接口服务
        runtime: custom-container
        code: ./
        timeout: 60
        memorySize: 512
        cpu: 0.5
        instanceConcurrency: 10
        customContainerConfig:
          image: registry.cn-hangzhou.aliyuncs.com/your-repo/card-key:latest
          command: '["python", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "9000"]'
          port: 9000
        environmentVariables:
          SUPABASE_URL: ${env.SUPABASE_URL}
          SUPABASE_KEY: ${env.SUPABASE_KEY}
          ADMIN_PASSWORD: ${env.ADMIN_PASSWORD}
          ENVIRONMENT: production
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
      customDomains:
        - domainName: auto
          protocol: HTTP
          routeConfigs:
            - path: /*
              serviceName: card-key-service
              functionName: api
