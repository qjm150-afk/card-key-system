<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容解锁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #FFF8F0;
            min-height: 100vh;
        }

        /* 初始状态：隐藏所有内容，显示加载 */
        body.loading-mode {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 加载动画 */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #F5E6D3;
            border-top-color: #D4A574;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 验证页面居中 */
        body.validate-mode {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* 成功页面全屏 */
        body.success-mode {
            padding: 0;
            margin: 0;
        }

        /* 初始隐藏页面 */
        #validatePage, #successPage {
            display: none;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 32px;
            border: 1px solid #F5E6D3;
        }

        .icon-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .icon {
            width: 64px;
            height: 64px;
            background-color: #D4A574;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #5D4E37;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #A89070;
            text-align: center;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #F5E6D3;
            border-radius: 12px;
            background-color: #FFF8F0;
            outline: none;
            transition: border-color 0.2s;
        }

        .input:focus {
            border-color: #D4A574;
        }

        .input::placeholder {
            color: #C4B5A0;
        }

        .hint {
            font-size: 12px;
            color: #A89070;
            text-align: center;
            margin-top: 8px;
        }

        .error-box {
            background-color: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .error-text {
            color: #DC2626;
            font-size: 14px;
            text-align: center;
        }

        .button {
            width: 100%;
            height: 48px;
            background-color: #D4A574;
            color: white;
            font-size: 18px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .button:hover {
            background-color: #C49464;
        }

        .button:disabled {
            background-color: #D4A574;
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #F5E6D3;
        }

        .footer-text {
            font-size: 12px;
            color: #A89070;
            text-align: center;
        }

        .footer-text + .footer-text {
            margin-top: 4px;
        }

        /* 成功页面样式 */
        .success-page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            background-color: #FFF8F0;
        }

        .success-header {
            display: none;  /* 隐藏顶部栏，完全全屏 */
        }

        .success-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .success-icon {
            width: 32px;
            height: 32px;
            background-color: #D4A574;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-icon svg {
            width: 16px;
            height: 16px;
            color: white;
        }

        .success-text {
            color: #5D4E37;
            font-weight: 500;
        }

        .password-info {
            font-size: 14px;
            color: #8B7355;
        }

        .password-value {
            font-weight: 500;
            color: #5D4E37;
        }

        .feishu-frame {
            flex: 1;
            width: 100%;
            border: none;
            min-height: 0;
        }

        /* 安全提示遮罩 */
        .security-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            color: white;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>
<body class="loading-mode" oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;" oncopy="return false;" oncut="return false;">
    <!-- 加载动画 -->
    <div id="loadingSpinner" class="loading-spinner"></div>

    <!-- 验证页面 -->
    <div id="validatePage" class="container">
        <div class="card">
            <div class="icon-wrapper">
                <div class="icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
            </div>

            <h1 class="title">内容解锁</h1>
            <p class="subtitle">请输入您的专属卡密</p>

            <form id="validateForm">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="cardKey" 
                        class="input" 
                        placeholder="CSS-XXXX-XXXX-XXXX"
                        maxlength="18"
                        autocomplete="off"
                    >
                    <p class="hint">示例: CSS-A1B2-C3D4-E5F6</p>
                </div>

                <div id="errorBox" class="error-box" style="display: none;">
                    <p id="errorText" class="error-text"></p>
                </div>

                <button type="submit" id="submitBtn" class="button">
                    立即解锁
                </button>
            </form>

            <div class="footer">
                <p class="footer-text">验证通过后可访问专属内容</p>
                <p class="footer-text">如需帮助请联系客服</p>
            </div>
        </div>
    </div>

    <!-- 成功页面 -->
    <div id="successPage" class="success-page" style="display: none;">
        <div class="success-header">
            <div class="success-info">
                <div class="success-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <span class="success-text">验证成功</span>
            </div>
            <div id="passwordInfo" class="password-info" style="display: none;">
                访问密码：<span id="passwordValue" class="password-value"></span>
            </div>
        </div>
        <iframe id="feishuFrame" class="feishu-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox" allowfullscreen></iframe>
    </div>

    <script>
        const form = document.getElementById('validateForm');
        const cardKeyInput = document.getElementById('cardKey');
        const submitBtn = document.getElementById('submitBtn');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const validatePage = document.getElementById('validatePage');
        const successPage = document.getElementById('successPage');
        const feishuFrame = document.getElementById('feishuFrame');
        const passwordInfo = document.getElementById('passwordInfo');
        const passwordValue = document.getElementById('passwordValue');

        // 会话过期时间（30天）
        const SESSION_EXPIRE_DAYS = 30;
        const STORAGE_KEY = 'card_key_session';
        const DEVICE_ID_KEY = 'card_key_device_id';

        // 获取或生成设备ID（每个设备唯一）
        function getDeviceId() {
            let deviceId = localStorage.getItem(DEVICE_ID_KEY);
            if (!deviceId) {
                // 生成唯一设备ID：时间戳 + 随机字符串
                deviceId = 'DEV-' + Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem(DEVICE_ID_KEY, deviceId);
            }
            return deviceId;
        }

        // 保存会话到 localStorage
        function saveSession(cardKey, url, password) {
            const session = {
                cardKey: cardKey,
                url: url,
                password: password || '',
                deviceId: getDeviceId(),
                expireAt: Date.now() + SESSION_EXPIRE_DAYS * 24 * 60 * 60 * 1000
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
        }

        // 获取本地会话
        function getLocalSession() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (!data) return null;
                
                const session = JSON.parse(data);
                
                // 检查是否过期
                if (Date.now() > session.expireAt) {
                    localStorage.removeItem(STORAGE_KEY);
                    return null;
                }
                
                return session;
            } catch (e) {
                return null;
            }
        }

        // 清除会话
        function clearSession() {
            localStorage.removeItem(STORAGE_KEY);
        }

        // 显示成功页面
        function showSuccess(url, password) {
            // 隐藏加载动画
            document.getElementById('loadingSpinner').style.display = 'none';
            // 切换到成功模式
            document.body.classList.remove('loading-mode');
            document.body.classList.remove('validate-mode');
            document.body.classList.add('success-mode');
            validatePage.style.display = 'none';
            successPage.style.display = 'flex';
            feishuFrame.src = url;
            
            if (password) {
                passwordValue.textContent = password;
                passwordInfo.style.display = 'block';
            }
        }

        // 显示验证页面
        function showValidate() {
            // 隐藏加载动画
            document.getElementById('loadingSpinner').style.display = 'none';
            // 切换到验证模式
            document.body.classList.remove('loading-mode');
            document.body.classList.add('validate-mode');
            document.body.classList.remove('success-mode');
            validatePage.style.display = 'flex';
            successPage.style.display = 'none';
        }

        // 自动格式化输入（支持 CSS-XXXX-XXXX-XXXX 格式）
        cardKeyInput.addEventListener('input', function(e) {
            let value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            // 格式化为 CSS-XXXX-XXXX-XXXX
            if (value.length > 3) {
                value = value.slice(0, 3) + '-' + value.slice(3);
            }
            if (value.length > 8) {
                value = value.slice(0, 8) + '-' + value.slice(8);
            }
            if (value.length > 13) {
                value = value.slice(0, 13) + '-' + value.slice(13, 17);
            }
            e.target.value = value;
        });

        // 显示错误
        function showError(message) {
            errorText.textContent = message;
            errorBox.style.display = 'block';
        }

        // 隐藏错误
        function hideError() {
            errorBox.style.display = 'none';
        }

        // 设置加载状态
        function setLoading(loading) {
            submitBtn.disabled = loading;
            if (loading) {
                submitBtn.innerHTML = '<div class="spinner"></div>验证中...';
            } else {
                submitBtn.innerHTML = '立即解锁';
            }
        }

        // 验证卡密
        async function validateCardKey(cardKey, saveSessionFlag = true) {
            const deviceId = getDeviceId();
            
            const response = await fetch('/api/validate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    card_key: cardKey,
                    device_id: deviceId 
                }),
            });

            const data = await response.json();

            if (data.can_access) {
                if (saveSessionFlag) {
                    saveSession(cardKey, data.url, data.password);
                }
                showSuccess(data.url, data.password);
                return { success: true };
            } else {
                // 验证失败，清除本地会话
                clearSession();
                return { success: false, msg: data.msg || '验证失败' };
            }
        }

        // 页面加载时检查本地会话
        async function checkSession() {
            const session = getLocalSession();
            
            if (session) {
                // 有本地会话，尝试验证
                try {
                    const result = await validateCardKey(session.cardKey, false);
                    if (!result.success) {
                        // 卡密已失效，显示验证页面
                        showValidate();
                    }
                } catch (err) {
                    // 网络错误，使用本地缓存的 URL
                    showSuccess(session.url, session.password);
                }
            } else {
                // 没有本地会话，显示验证页面
                showValidate();
            }
        }

        // 表单提交
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError();

            const cardKey = cardKeyInput.value.trim();
            
            if (!cardKey) {
                showError('请输入卡密');
                return;
            }

            if (!cardKey.match(/^CSS-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/)) {
                showError('卡密格式不正确，示例：CSS-A1B2-C3D4-E5F6');
                return;
            }

            setLoading(true);

            try {
                const result = await validateCardKey(cardKey, true);
                if (!result.success) {
                    showError(result.msg);
                }
            } catch (err) {
                showError('验证失败，请稍后重试');
            } finally {
                setLoading(false);
            }
        });

        // 页面加载时检查会话
        document.addEventListener('DOMContentLoaded', checkSession);

        // ==================== 安全保护措施 ====================

        // 禁用键盘快捷键
        document.addEventListener('keydown', function(e) {
            // F12 - 开发者工具
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I - 开发者工具
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+J - 控制台
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+C - 元素选择
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+U - 查看源码
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+S - 保存
            if (e.ctrlKey && (e.key === 'S' || e.key === 's')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+P - 打印
            if (e.ctrlKey && (e.key === 'P' || e.key === 'p')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+C - 复制
            if (e.ctrlKey && (e.key === 'C' || e.key === 'c') && !e.shiftKey) {
                e.preventDefault();
                return false;
            }
            // Ctrl+A - 全选
            if (e.ctrlKey && (e.key === 'A' || e.key === 'a')) {
                e.preventDefault();
                return false;
            }
            // Ctrl+X - 剪切
            if (e.ctrlKey && (e.key === 'X' || e.key === 'x')) {
                e.preventDefault();
                return false;
            }
        });

        // 开发者工具检测（通过 debugger 时间差检测）
        let devtoolsOpen = false;
        const threshold = 160;

        setInterval(function() {
            const start = performance.now();
            debugger;
            const end = performance.now();
            if (end - start > threshold) {
                if (!devtoolsOpen) {
                    devtoolsOpen = true;
                    // 可以选择关闭页面或显示警告
                    document.body.innerHTML = '<div class="security-overlay"><div><p>检测到开发者工具</p><p>请关闭后刷新页面</p></div></div>';
                }
            } else {
                devtoolsOpen = false;
            }
        }, 1000);

        // 禁用右键菜单（已通过 oncontextmenu 实现，这里作为备用）
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // 禁用选择文本
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });

        // 禁用拖拽
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });

        // 禁用复制
        document.addEventListener('copy', function(e) {
            e.preventDefault();
            return false;
        });

        // 禁用剪切
        document.addEventListener('cut', function(e) {
            e.preventDefault();
            return false;
        });

        // 检测窗口尺寸变化（开发者工具打开会改变窗口尺寸）
        let lastWindowWidth = window.innerWidth;
        let lastWindowHeight = window.innerHeight;

        window.addEventListener('resize', function() {
            const widthDiff = Math.abs(window.innerWidth - lastWindowWidth);
            const heightDiff = Math.abs(window.innerHeight - lastWindowHeight);
            
            // 如果窗口尺寸变化很大（可能是开发者工具打开）
            if (widthDiff > 100 || heightDiff > 100) {
                // 可以选择显示警告或刷新页面
                console.clear();
            }
            
            lastWindowWidth = window.innerWidth;
            lastWindowHeight = window.innerHeight;
        });

        // 定时清除控制台
        setInterval(function() {
            console.clear();
        }, 2000);

        // 禁用打印
        window.addEventListener('beforeprint', function(e) {
            e.preventDefault();
            document.body.style.display = 'none';
        });

        window.addEventListener('afterprint', function(e) {
            document.body.style.display = '';
        });

        // 禁用 CSS 打印样式
        const style = document.createElement('style');
        style.innerHTML = `
            @media print {
                body { display: none !important; }
            }
            * {
                -webkit-user-select: none !important;
                -moz-user-select: none !important;
                -ms-user-select: none !important;
                user-select: none !important;
                -webkit-touch-callout: none !important;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
